version: '3.8'

services:
  backend:
    build: ./kanban-backend  
    container_name: test-backend
    ports:
      - "8081:8081" 
    networks:
      - app-network

  frontend:
    build: ./kanban-frontend 
    container_name: test-frontend
    ports:
      - "8080:80" 
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: test-nginx
    ports:
      - "80:80"  
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
